<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@Tường | Luxury </title>
    <link id="favicon" rel="icon" type="image/x-icon" href="">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        const CONFIG = {
            ten_hien_thi: "Tường",
            anh_dai_dien: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/ttttt.jpg", 
            link_nhac_mp3: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/Iu%20La%20Day.mp3",
            ten_bai_hat: "Iu Là Đây...", 
            video_nen: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/202603110751.mp4", // Đã sửa lại video chuẩn
            qr_zalo: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/zalo.jpg",
            qr_momo: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/momo.jpg",
            qr_mbbank: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/mb.jpg",
            items: [
                { ten: "Facebook", icon: "fab fa-facebook", url: "https://www.facebook.com/wall.2k4", mau: "#1877f2" },
                { ten: "TikTok", icon: "fab fa-tiktok", url: "https://www.tiktok.com/@wall.2k4", mau: "#ffffff" },
                { ten: "Instagram", icon: "fab fa-instagram", url: "https://www.instagram.com/wall_204/", mau: "#e4405f" },
                { ten: "Discord", icon: "fab fa-discord", url: "https://discord.com/invite/pE7jSeYVd5", mau: "#5865f2" },
                { ten: "Zalo", icon: "fas fa-comment", url: "qr", mau: "#0068ff" },
                { ten: "Momo", icon: "fas fa-wallet", url: "qr", mau: "#a50064" },
                { ten: "MB Bank", icon: "fas fa-university", url: "qr", mau: "#004a99" },
                { ten: "YouTube", icon: "fab fa-youtube", url: "https://www.youtube.com/@Tuong04", mau: "#ff0000" }
            ]
        };
    </script>

    <style>
        /* CURSOR */
        html, body { cursor: url('https://cur.cursors-4u.net/anime/ani-11/ani1097.cur'), auto !important; margin: 0; padding: 0; background: #000; color: white; font-family: 'Montserrat', sans-serif; height: 100vh; overflow: hidden; }
        
        /* VIDEO NỀN CHUẨN */
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); z-index: -1; }
        #sakura-canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 50; }

        /* MẮT XEM GÓC PHẢI */
        .viewer-count { position: fixed; top: 15px; right: 15px; z-index: 100; background: rgba(0, 0, 0, 0.4); padding: 4px 12px; border-radius: 20px; display: flex; align-items: center; gap: 6px; font-size: 13px; backdrop-filter: blur(5px); }
        .viewer-count i { color: #ff79c6; }

        /* LOA VÀ THANH NHẠC GÓC TRÁI (THEO MẪU BẠN GỬI) */
        .music-wrapper { position: fixed; top: 15px; left: 15px; z-index: 100; display: flex; flex-direction: column; gap: 8px; }
        .vol-container { display: flex; align-items: center; gap: 8px; }
        .vol-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; }
        #volSlider { width: 70px; height: 8px; accent-color: #ff79c6; cursor: pointer; }
        
        .music-box { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); padding: 5px 15px; border-radius: 30px; display: flex; align-items: center; backdrop-filter: blur(10px); width: 140px; height: 35px; gap: 10px; }
        .vis { display: flex; align-items: flex-end; gap: 2px; height: 15px; }
        .v-bar { width: 2px; background: #ff79c6; height: 30%; border-radius: 1px; }
        .playing .v-bar { animation: dance 0.8s infinite alternate; }
        .playing .v-bar:nth-child(2) { animation-delay: 0.2s; }
        .playing .v-bar:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dance { from { height: 20%; } to { height: 100%; } }
        .m-title { overflow: hidden; white-space: nowrap; flex-grow: 1; font-size: 11px; font-weight: bold; }
        .m-run { display: inline-block; padding-left: 100%; animation: marquee 8s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        /* HEADER & GRID */
        .content { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; z-index: 1; position: relative; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 2px solid white; margin-bottom: 10px; }
        #user-name { font-size: 32px; font-weight: 700; background: linear-gradient(90deg, #ff79c6, #bd93f9, #ff79c6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; margin: 5px 0; }
        @keyframes shine { to { background-position: 200% center; } }
        
        .player-main { width: 300px; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.3); padding: 8px 15px; border-radius: 20px; margin-bottom: 25px; }
        .p-fill-bg { flex-grow: 1; height: 6px; background: rgba(255,255,255,0.2); border-radius: 10px; position: relative; cursor: pointer; }
        .p-fill { height: 100%; width: 0%; background: #ff79c6; border-radius: 10px; box-shadow: 0 0 10px #ff79c6; }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; width: 90%; max-width: 900px; }
        @media (max-width: 768px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        .item { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; text-align: center; text-decoration: none; color: white; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .item:hover { background: rgba(255,255,255,0.15); transform: translateY(-5px); }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; justify-content: center; align-items: center; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="overlay">MỞ THẾ GIỚI CỦA TƯỜNG</div>
    <video id="bg-video" loop playsinline muted><source src="" id="videoSrc"></video>
    <div class="overlay"></div>
    <canvas id="sakura-canvas"></canvas>

    <div class="viewer-count"><i class="fas fa-eye"></i> 1.182</div>

    <div class="music-wrapper">
        <div class="vol-container">
            <button class="vol-btn" onclick="toggleMute()"><i id="v-icon" class="fas fa-volume-up"></i></button>
            <input type="range" id="volSlider" min="0" max="1" step="0.1" value="1">
        </div>
        <div class="music-box" id="m-box">
            <div class="vis"><div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div></div>
            <div class="m-title"><span class="m-run" id="m-name"></span></div>
        </div>
    </div>

    <div class="content">
        <img id="avatar" src="" class="avatar">
        <div style="display: flex; align-items: center; gap: 8px;">
            <h1 id="user-name"></h1>
            <i class="fas fa-check-circle" style="color: #1877f2; font-size: 20px;"></i>
        </div>

        <div class="player-main">
            <i id="p-btn" class="fas fa-play" style="color: #ff79c6; cursor: pointer; width: 20px;"></i>
            <div class="p-fill-bg" id="p-area"><div class="p-fill" id="p-fill"></div></div>
            <span style="font-size: 10px; min-width: 65px;"><span id="cur">0:00</span> / <span id="dur">0:00</span></span>
        </div>

        <div class="grid" id="grid"></div>
    </div>

    <audio id="audio" loop><source src="" id="audioSrc"></audio>

    <script>
        // INIT DATA
        document.getElementById('avatar').src = CONFIG.anh_dai_dien;
        document.getElementById('favicon').href = CONFIG.anh_dai_dien;
        document.getElementById('user-name').innerText = CONFIG.ten_hien_thi;
        document.getElementById('m-name').innerText = CONFIG.ten_bai_hat;
        document.getElementById('audioSrc').src = CONFIG.link_nhac_mp3;
        document.getElementById('videoSrc').src = CONFIG.video_nen;
        document.getElementById('bg-video').load();

        // TAB TITLE RUNNING
        let tabTitle = "@" + CONFIG.ten_hien_thi + " | Luxury ";
        setInterval(() => { tabTitle = tabTitle.substring(1) + tabTitle.substring(0, 1); document.title = tabTitle; }, 300);

        // GRID RENDER
        document.getElementById('grid').innerHTML = CONFIG.items.map(i => `
            <a href="${i.url==='qr'?'#':i.url}" class="item"><i class="${i.icon}" style="color:${i.mau}"></i><b>${i.ten}</b></a>
        `).join('');

        // LOGIC
        const audio = document.getElementById('audio');
        const video = document.getElementById('bg-video');
        const pBtn = document.getElementById('p-btn');

        document.getElementById('overlay').onclick = () => {
            document.getElementById('overlay').style.display = 'none';
            video.play(); audio.play();
            pBtn.className = "fas fa-pause";
            document.getElementById('m-box').classList.add('playing');
        };

        pBtn.onclick = () => {
            if(audio.paused) { audio.play(); pBtn.className="fas fa-pause"; document.getElementById('m-box').classList.add('playing'); }
            else { audio.pause(); pBtn.className="fas fa-play"; document.getElementById('m-box').classList.remove('playing'); }
        };

        document.getElementById('volSlider').oninput = (e) => { audio.volume = e.target.value; };
        function toggleMute() { audio.muted = !audio.muted; document.getElementById('v-icon').className = audio.muted ? "fas fa-volume-mute" : "fas fa-volume-up"; }

        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('p-fill').style.width = pct + "%";
            document.getElementById('cur').innerText = formatTime(audio.currentTime);
            if(!isNaN(audio.duration)) document.getElementById('dur').innerText = formatTime(audio.duration);
        };
        function formatTime(s) { let m=Math.floor(s/60), r=Math.floor(s%60); return m+":"+(r<10?'0':'')+r; }
        
        // SAKURA (GIỮ NGUYÊN CODE CŨ CỦA BẠN ĐỂ ĐẢM BẢO GIAO DIỆN)
        const canvas = document.getElementById('sakura-canvas');
        const ctx = canvas.getContext('2d');
        let petals = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Petal {
            constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height-canvas.height; this.size = Math.random()*5+2; this.speed = Math.random()*1+0.5; this.angle = Math.random()*360; }
            draw() { ctx.beginPath(); ctx.ellipse(this.x, this.y, this.size, this.size/2, this.angle, 0, Math.PI*2); ctx.fillStyle = '#ffb7c5'; ctx.fill(); }
            update() { this.y += this.speed; this.x += Math.sin(this.y/50); if(this.y > canvas.height) this.y = -10; }
        }
        for(let i=0; i<30; i++) petals.push(new Petal());
        function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); petals.forEach(p=>{p.update(); p.draw();}); requestAnimationFrame(anim); }
        anim();
    </script>
</body>
</html>
