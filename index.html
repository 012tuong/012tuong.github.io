<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@Tường | Luxury </title>
    <link id="favicon" rel="icon" type="image/x-icon" href="">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        const CONFIG = {
            ten_hien_thi: "Tường",
            anh_dai_dien: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/ttttt.jpg", 
            link_nhac_mp3: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/Iu%20La%20Day.mp3",
            ten_bai_hat: "Iu Là Đây...", 
            video_nen: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/202603110751.mp4",
            qr_zalo: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/zalo.jpg",
            qr_momo: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/momo.jpg",
            qr_mbbank: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/mb.jpg",
            items: [
                { ten: "Facebook", icon: "fab fa-facebook", url: "https://www.facebook.com/wall.2k4", mau: "#1877f2" },
                { ten: "TikTok", icon: "fab fa-tiktok", url: "https://www.tiktok.com/@wall.2k4", mau: "#ffffff" },
                { ten: "Instagram", icon: "fab fa-instagram", url: "https://www.instagram.com/wall_204/", mau: "#e4405f" },
                { ten: "Discord", icon: "fab fa-discord", url: "https://discord.com/invite/pE7jSeYVd5", mau: "#5865f2" },
                { ten: "Zalo", icon: "fas fa-comment", url: "qr", mau: "#0068ff" },
                { ten: "Momo", icon: "fas fa-wallet", url: "qr", mau: "#a50064" },
                { ten: "MB Bank", icon: "fas fa-university", url: "qr", mau: "#004a99" },
                { ten: "YouTube", icon: "fab fa-youtube", url: "https://www.youtube.com/@Tuong04", mau: "#ff0000" }
            ]
        };
    </script>

    <style>
        /* CURSOR & GENERAL */
        html, body { cursor: url('https://cur.cursors-4u.net/anime/ani-11/ani1097.cur'), auto !important; margin: 0; padding: 0; background: #000; color: white; font-family: 'Montserrat', sans-serif; min-height: 100vh; overflow-x: hidden; }
        a, button, .grid-item, .ctrl-btn, #volumeSlider { cursor: url('https://cur.cursors-4u.net/anime/ani-11/ani1097.cur'), pointer !important; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: -1; }
        #sakura-canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 50; }

        /* MẮT XEM (TOP RIGHT) */
        .viewer-count { 
            position: fixed; top: 15px; right: 15px; z-index: 100;
            background: rgba(0, 0, 0, 0.4); padding: 4px 12px; border-radius: 20px;
            display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: bold; backdrop-filter: blur(5px);
        }
        .viewer-count i { color: #ff79c6; }

        /* ĐIỀU KHIỂN ÂM LƯỢNG (TOP LEFT) */
        .top-left-controls {
            position: fixed; top: 15px; left: 15px; z-index: 100;
            display: flex; align-items: center; gap: 10px;
        }
        .ctrl-btn {
            background: rgba(0, 0, 0, 0.4); border: none; color: white;
            width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(5px); transition: 0.3s;
        }
        .volume-pop { display: flex; align-items: center; background: rgba(0, 0, 0, 0.4); padding: 0 10px; border-radius: 20px; height: 32px; backdrop-filter: blur(5px); }
        #volumeSlider { width: 60px; accent-color: #ff79c6; }

        /* BOX NHẠC GÓC TRÁI (Dưới nút volume) */
        .music-top-left { 
            position: fixed; top: 55px; left: 15px; z-index: 100; 
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); 
            padding: 5px 12px; border-radius: 30px; display: flex; align-items: center; 
            backdrop-filter: blur(15px); height: 32px; width: 135px; gap: 6px;
        }
        .visualizer { display: flex; align-items: flex-end; gap: 2px; height: 12px; }
        .vis-bar { width: 2px; background: #ff79c6; border-radius: 1px; height: 30%; }
        .playing .vis-bar { animation: dance 0.8s infinite alternate; }
        .playing .vis-bar:nth-child(2) { animation-delay: 0.2s; }
        .playing .vis-bar:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dance { from { height: 20%; } to { height: 100%; } }
        .marquee-container { flex-grow: 1; overflow: hidden; white-space: nowrap; }
        .marquee-text { display: inline-block; padding-left: 100%; animation: marquee 8s linear infinite; font-size: 9px; font-weight: bold; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        /* HEADER */
        .header { text-align: center; margin-top: 100px; margin-bottom: 30px; position: relative; z-index: 1; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        #user-name { 
            font-size: 32px; font-weight: 700; background: linear-gradient(90deg, #ff79c6, #bd93f9, #ff79c6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200% auto; animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        /* PLAYER */
        .player-controls { width: 320px; margin: 0 auto; display: flex; align-items: center; justify-content: center; gap: 12px; background: rgba(0,0,0,0.25); padding: 10px 18px; border-radius: 25px; }
        .progress-bar-container { flex-grow: 1; background: rgba(255,255,255,0.15); height: 6px; border-radius: 10px; position: relative; }
        .progress-fill { background: #ff79c6; height: 100%; width: 0%; border-radius: 10px; box-shadow: 0 0 10px #ff79c6; }

        /* GRID */
        .grid-container { display: grid; gap: 15px; width: 90%; max-width: 1000px; margin: 0 auto 50px auto; z-index: 1; position: relative; }
        @media (min-width: 768px) { .grid-container { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 767px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
        .grid-item { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; text-align: center; text-decoration: none; color: white; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .grid-item:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-5px); }
        
        #play-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; cursor: pointer; font-weight: bold; }
        #qr-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <canvas id="sakura-canvas"></canvas>
    <div id="play-overlay">MỞ THẾ GIỚI CỦA TƯỜNG</div>

    <div class="viewer-count">
        <i class="fas fa-eye"></i> <span id="viewCount">1.182</span>
    </div>

    <div class="top-left-controls">
        <button class="ctrl-btn" onclick="toggleMute()"><i id="muteIcon" class="fas fa-volume-up"></i></button>
        <div class="volume-pop">
            <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1">
        </div>
    </div>

    <video id="bg-video" autoplay muted loop playsinline><source src="https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/202603110751.mp4"></video>
    <div class="overlay"></div>

    <div class="music-top-left" id="musicBox">
        <div class="visualizer"><div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div></div>
        <div class="marquee-container"><div class="marquee-text" id="m-name">Đang tải...</div></div>
    </div>

    <div class="header">
        <img id="avatar" src="" class="avatar">
        <div style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px;">
            <h1 id="user-name"></h1>
            <i class="fas fa-check-circle" style="color: #1877f2; font-size: 24px;"></i>
        </div>
        <div class="player-controls">
            <i id="playBtn" class="fas fa-play" style="color: #ff79c6; cursor: pointer;"></i>
            <div class="progress-bar-container" id="progressArea"><div class="progress-fill" id="progressFill"></div></div>
            <div style="font-size: 10px; font-weight: bold; min-width: 60px;"><span id="currTime">0:00</span> / <span id="totalTime">0:00</span></div>
        </div>
    </div>

    <div class="grid-container" id="grid-content"></div>
    <audio id="myAudio" loop><source id="audioSrc" src="" type="audio/mpeg"></audio>

    <script>
        // INIT DATA & TAB EFFECTS
        document.getElementById('avatar').src = CONFIG.anh_dai_dien;
        document.getElementById('favicon').href = CONFIG.anh_dai_dien;
        document.getElementById('user-name').innerText = CONFIG.ten_hien_thi;
        document.getElementById('m-name').innerText = CONFIG.ten_bai_hat;
        document.getElementById('audioSrc').src = CONFIG.link_nhac_mp3;

        let tabTitle = "@" + CONFIG.ten_hien_thi + " | Luxury ";
        setInterval(() => { tabTitle = tabTitle.substring(1) + tabTitle.substring(0, 1); document.title = tabTitle; }, 300);

        // VOLUME LOGIC
        const audio = document.getElementById('myAudio');
        const volSlider = document.getElementById('volumeSlider');
        const muteIcon = document.getElementById('muteIcon');

        volSlider.oninput = (e) => { audio.volume = e.target.value; if(audio.volume == 0) muteIcon.className = "fas fa-volume-mute"; else muteIcon.className = "fas fa-volume-up"; };
        function toggleMute() { if(audio.muted) { audio.muted = false; muteIcon.className = "fas fa-volume-up"; } else { audio.muted = true; muteIcon.className = "fas fa-volume-mute"; } }

        // RENDER GRID
        const gridContainer = document.getElementById('grid-content');
        gridContainer.innerHTML = CONFIG.items.map(item => `
            <a href="${item.url === 'qr' ? '#' : item.url}" target="${item.url === 'qr' ? '_self' : '_blank'}" class="grid-item">
                <i class="${item.icon}" style="color: ${item.mau}"></i><b>${item.ten}</b>
            </a>`).join('');

        // AUDIO & PLAY LOGIC
        const playBtn = document.getElementById('playBtn');
        document.getElementById('play-overlay').onclick = () => {
            document.getElementById('play-overlay').style.display = 'none';
            audio.play();
            playBtn.className = "fas fa-pause";
            document.getElementById('musicBox').classList.add('playing');
        };

        playBtn.onclick = () => {
            if (audio.paused) { audio.play(); playBtn.className = "fas fa-pause"; document.getElementById('musicBox').classList.add('playing'); }
            else { audio.pause(); playBtn.className = "fas fa-play"; document.getElementById('musicBox').classList.remove('playing'); }
        };

        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progressFill').style.width = pct + "%";
            document.getElementById('currTime').innerText = Math.floor(audio.currentTime/60) + ":" + (Math.floor(audio.currentTime%60) < 10 ? '0' : '') + Math.floor(audio.currentTime%60);
        };
    </script>
</body>
</html>
