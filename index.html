<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@Tường | Luxury </title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        const CONFIG = {
            ten_hien_thi: "Tường",
            anh_dai_dien: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/ttttt.jpg", 
            link_nhac_mp3: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/Iu%20La%20Day.mp3",
            ten_bai_hat: "Iu Là Đây...", 
            video_nen: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/202603110751.mp4",
            qr_zalo: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/zalo.jpg",
            qr_momo: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/momo.jpg",
            qr_mbbank: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/mb.jpg",
            items: [
                { ten: "Facebook", icon: "fab fa-facebook", url: "https://www.facebook.com/wall.2k4", mau: "#1877f2" },
                { ten: "TikTok", icon: "fab fa-tiktok", url: "https://www.tiktok.com/@wall.2k4", mau: "#ffffff" },
                { ten: "Instagram", icon: "fab fa-instagram", url: "https://www.instagram.com/wall_204/", mau: "#e4405f" },
                { ten: "Discord", icon: "fab fa-discord", url: "https://discord.com/invite/pE7jSeYVd5", mau: "#5865f2" },
                { ten: "Zalo", icon: "fas fa-comment", url: "qr", mau: "#0068ff" },
                { ten: "Momo", icon: "fas fa-wallet", url: "qr", mau: "#a50064" },
                { ten: "MB Bank", icon: "fas fa-university", url: "qr", mau: "#004a99" },
                { ten: "YouTube", icon: "fab fa-youtube", url: "https://www.youtube.com/@Tuong04", mau: "#ff0000" }
            ]
        };
    </script>

    <style>
        /* CURSOR */
        html, body { cursor: url('https://cur.cursors-4u.net/anime/ani-11/ani1097.cur'), auto !important; }
        a, button, .grid-item, #playBtn, .progress-bar-container { cursor: url('https://cur.cursors-4u.net/anime/ani-11/ani1097.cur'), pointer !important; }

        body { margin: 0; padding: 0; background: #000; color: white; font-family: 'Montserrat', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; background-color: #000; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: -1; }
        
        /* CANVAS HOA ANH ĐÀO */
        #sakura-canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 50; }

        /* BOX NHẠC GÓC TRÁI */
        .music-top-left { 
            position: fixed; top: 15px; left: 15px; z-index: 100; 
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); 
            padding: 5px 12px; border-radius: 30px; display: flex; align-items: center; 
            backdrop-filter: blur(15px); height: 32px; width: 135px; gap: 6px;
        }

        /* SÓNG NHẠC MINI */
        .visualizer { display: flex; align-items: flex-end; gap: 2px; height: 12px; width: 15px; }
        .vis-bar { width: 2px; background: #ff79c6; border-radius: 1px; height: 30%; }
        .playing .vis-bar { animation: dance 0.8s infinite alternate; }
        .playing .vis-bar:nth-child(2) { animation-delay: 0.2s; }
        .playing .vis-bar:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dance { from { height: 20%; } to { height: 100%; } }

        .marquee-container { flex-grow: 1; overflow: hidden; white-space: nowrap; }
        .marquee-text { display: inline-block; padding-left: 100%; animation: marquee 8s linear infinite; font-size: 9px; font-weight: bold; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        .header { text-align: center; margin-top: 80px; margin-bottom: 30px; z-index: 1; position: relative; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 20px rgba(255,255,255,0.2); margin-bottom: 10px; }
        
        /* CHỮ TƯỜNG GRADIENT */
        .name-wrapper { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 15px; }
        #user-name { 
            margin: 0; font-size: 32px; font-weight: 700; 
            background: linear-gradient(90deg, #ff79c6, #bd93f9, #ff79c6);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }
        .verified-tick { color: #1877f2; font-size: 24px; }

        /* PLAYER */
        .player-controls { width: 320px; margin: 0 auto; display: flex; align-items: center; justify-content: center; gap: 12px; background: rgba(0,0,0,0.25); padding: 10px 18px; border-radius: 25px; }
        .play-main-btn { font-size: 16px; cursor: pointer; color: #ff79c6; width: 25px; height: 25px; display: flex; align-items: center; justify-content: center; }
        .progress-bar-container { flex-grow: 1; background: rgba(255,255,255,0.15); height: 6px; border-radius: 10px; cursor: pointer; position: relative; display: flex; align-items: center; }
        .progress-fill { background: #ff79c6; height: 100%; width: 0%; border-radius: 10px; box-shadow: 0 0 10px #ff79c6; position: relative; }
        .progress-fill::after { content: ""; position: absolute; right: -6px; top: 50%; transform: translateY(-50%); width: 12px; height: 12px; background: #fff; border-radius: 50%; box-shadow: 0 0 8px #ff79c6; transition: transform 0.2s; }

        /* GRID ITEM - TILT EFFECT */
        .grid-container { display: grid; gap: 15px; width: 90%; max-width: 1000px; padding-bottom: 50px; z-index: 1; perspective: 1000px; }
        @media (min-width: 768px) { .grid-container { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 767px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
        
        .grid-item { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 20px; padding: 20px; text-align: center; text-decoration: none; 
            color: white; display: flex; flex-direction: column; align-items: center;
            transition: transform 0.1s ease-out, background 0.3s;
            transform-style: preserve-3d;
        }
        .grid-item i { font-size: 25px; margin-bottom: 10px; transform: translateZ(20px); }
        .grid-item b { transform: translateZ(10px); }
        .grid-item:hover { background: rgba(255, 255, 255, 0.15); border-color: white; }

        #play-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; cursor: pointer; font-weight: bold; letter-spacing: 2px; }
        #qr-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .qr-content { background: #1a1a1a; padding: 25px; border-radius: 25px; text-align: center; border: 1px solid #333; max-width: 300px; width: 85%; }
        .qr-content img { width: 100%; border-radius: 15px; margin-bottom: 15px; border: 4px solid white; }
        .close-btn { background: #ff79c6; border: none; color: white; padding: 8px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <canvas id="sakura-canvas"></canvas>
    <div id="play-overlay">MỞ THẾ GIỚI CỦA TƯỜNG</div>
    
    <video id="bg-video" autoplay muted loop playsinline preload="auto">
        <source src="https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/202603110751.mp4">
    </video>
    <div class="overlay"></div>

    <div id="qr-modal">
        <div class="qr-content">
            <h3 id="qr-title" style="color:#ff79c6">Quét mã</h3>
            <div style="margin-bottom: 15px; font-weight: bold;">NGUYỄN VĂN TƯỜNG</div>
            <img id="qr-img" src="">
            <button class="close-btn" onclick="closeQR()">ĐÓNG</button>
        </div>
    </div>

    <div class="music-top-left" id="musicBox">
        <div class="visualizer">
            <div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div>
        </div>
        <div class="marquee-container">
            <div class="marquee-text" id="m-name">Đang tải...</div>
        </div>
    </div>

    <div class="header">
        <img id="avatar" src="" class="avatar">
        <div class="name-wrapper">
            <h1 id="user-name"></h1>
            <i class="fas fa-check-circle verified-tick"></i>
        </div>
        <div class="player-controls">
            <i id="playBtn" class="fas fa-play play-main-btn"></i>
            <div class="progress-bar-container" id="progressArea">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div style="font-size: 10px; font-weight: bold; min-width: 60px;">
                <span id="currTime">0:00</span> / <span id="totalTime">0:00</span>
            </div>
        </div>
    </div>

    <div class="grid-container" id="grid-content"></div>
    <audio id="myAudio" loop><source id="audioSrc" src="" type="audio/mpeg"></audio>

    <script>
        // INIT DATA & TAB TITLE RUNNING
        document.getElementById('avatar').src = CONFIG.anh_dai_dien;
        document.getElementById('user-name').innerText = CONFIG.ten_hien_thi;
        document.getElementById('m-name').innerText = CONFIG.ten_bai_hat;
        document.getElementById('audioSrc').src = CONFIG.link_nhac_mp3;

        // HIỆU ỨNG TIÊU ĐỀ TAB CHẠY CHỮ
        let tabTitle = "@" + CONFIG.ten_hien_thi + " | Luxury ";
        setInterval(() => {
            tabTitle = tabTitle.substring(1) + tabTitle.substring(0, 1);
            document.title = tabTitle;
        }, 300);

        // GRID & TILT EFFECT
        const gridContainer = document.getElementById('grid-content');
        gridContainer.innerHTML = CONFIG.items.map(item => {
            const isQR = item.url === "qr";
            const attr = isQR ? `onclick="showQR('${item.ten}')"` : `href="${item.url}" target="_blank"`;
            return `<div class="grid-item-wrap"><${isQR?'div':'a'} ${attr} class="grid-item">
                <i class="${item.icon}" style="color: ${item.mau}"></i><b>${item.ten}</b>
            </${isQR?'div':'a'}></div>`;
        }).join('');

        // TILT LOGIC
        document.querySelectorAll('.grid-item').forEach(item => {
            item.addEventListener('mousemove', (e) => {
                const rect = item.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const xc = rect.width / 2;
                const yc = rect.height / 2;
                const dx = x - xc;
                const dy = y - yc;
                item.style.transform = `rotateY(${dx / 10}deg) rotateX(${-dy / 10}deg) scale(1.05)`;
            });
            item.addEventListener('mouseleave', () => {
                item.style.transform = `rotateY(0deg) rotateX(0deg) scale(1)`;
            });
        });

        // SAKURA EFFECT
        const canvas = document.getElementById('sakura-canvas');
        const ctx = canvas.getContext('2d');
        let petals = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class Petal {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 7 + 3;
                this.speed = Math.random() * 1 + 0.5;
                this.angle = Math.random() * 360;
                this.spin = Math.random() * 2 - 1;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle * Math.PI / 180);
                ctx.beginPath();
                ctx.ellipse(0, 0, this.size, this.size / 2, 0, 0, Math.PI * 2);
                ctx.fillStyle = '#ffb7c5';
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.y += this.speed;
                this.x += Math.sin(this.y / 50);
                this.angle += this.spin;
                if (this.y > canvas.height) { this.y = -10; this.x = Math.random() * canvas.width; }
            }
        }
        for (let i = 0; i < 50; i++) petals.push(new Petal());
        function animateSakura() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            petals.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateSakura);
        }
        animateSakura();

        // AUDIO LOGIC
        const audio = document.getElementById('myAudio');
        const playBtn = document.getElementById('playBtn');
        const musicBox = document.getElementById('musicBox');

        function startEverything() {
            document.getElementById('play-overlay').style.display = 'none';
            document.getElementById('bg-video').play();
            audio.play();
            playBtn.className = "fas fa-pause play-main-btn";
            musicBox.classList.add('playing');
        }
        document.getElementById('play-overlay').onclick = startEverything;

        playBtn.onclick = () => {
            if (audio.paused) { audio.play(); playBtn.className = "fas fa-pause play-main-btn"; musicBox.classList.add('playing'); }
            else { audio.pause(); playBtn.className = "fas fa-play play-main-btn"; musicBox.classList.remove('playing'); }
        };

        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progressFill').style.width = pct + "%";
            document.getElementById('currTime').innerText = formatTime(audio.currentTime);
            if (!isNaN(audio.duration)) document.getElementById('totalTime').innerText = formatTime(audio.duration);
        };

        function formatTime(sec) {
            let m = Math.floor(sec / 60); let s = Math.floor(sec % 60);
            return m + ":" + (s < 10 ? "0" + s : s);
        }

        document.getElementById('progressArea').onclick = (e) => {
            audio.currentTime = (e.offsetX / e.currentTarget.clientWidth) * audio.duration;
        };

        function showQR(type) {
            const img = document.getElementById('qr-img');
            document.getElementById('qr-title').innerText = "Quét mã " + type;
            if (type === "Zalo") img.src = CONFIG.qr_zalo;
            else if (type === "Momo") img.src = CONFIG.qr_momo;
            else if (type === "MB Bank") img.src = CONFIG.qr_mbbank;
            document.getElementById('qr-modal').style.display = "flex";
        }
        function closeQR() { document.getElementById('qr-modal').style.display = "none"; }
    </script>
</body>
</html>
