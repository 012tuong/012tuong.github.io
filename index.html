<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuong 🎂 | Luxury Bio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ffffff;
            --accent: #ff00ff; /* Màu neon chủ đạo */
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0;
            background: #050505; /* Nền đen sâu */
            color: white;
            font-family: 'Montserrat', sans-serif;
            display: flex; justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Hình nền mờ ảo phía sau */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a0033 0%, #050505 100%);
            z-index: -1;
        }

        .container {
            width: 100%; max-width: 450px;
            padding: 40px 20px;
            text-align: center;
            z-index: 2;
        }

        /* Avatar Luxury */
        .profile-img {
            width: 110px; height: 110px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            padding: 5px;
            box-shadow: 0 0 20px var(--accent);
            object-fit: cover;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 10px var(--accent); }
            50% { box-shadow: 0 0 25px var(--accent); }
            100% { box-shadow: 0 0 10px var(--accent); }
        }

        h1 { font-size: 24px; margin: 15px 0 5px; font-weight: 700; }
        .bio { font-size: 13px; opacity: 0.8; line-height: 1.6; margin-bottom: 25px; }

        /* Social Icons */
        .social-icons { margin-bottom: 30px; display: flex; justify-content: center; gap: 20px; }
        .social-icons a { color: white; font-size: 20px; transition: 0.3s; opacity: 0.7; }
        .social-icons a:hover { opacity: 1; color: var(--accent); transform: translateY(-3px); }

        /* Button Style */
        .link-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex; align-items: center;
            text-decoration: none; color: white;
            transition: 0.4s;
            position: relative; overflow: hidden;
        }
        .link-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            transform: scale(1.02);
        }
        .link-card i { font-size: 24px; width: 40px; }
        .link-card span { flex-grow: 1; font-weight: 600; font-size: 14px; }

        /* TikTok Card */
        .tiktok-card {
            background: linear-gradient(45deg, #000, #333);
            border-radius: 15px; padding: 15px; margin: 20px 0;
            display: flex; align-items: center; gap: 15px;
            border: 1px solid #444;
        }
        .tk-info { text-align: left; }
        .tk-name { font-weight: bold; font-size: 16px; }
        .tk-stats { font-size: 12px; opacity: 0.6; }

        /* QR Section */
        .qr-section {
            background: rgba(255,255,255,0.03);
            border-radius: 20px; padding: 20px; margin-top: 20px;
            border: 1px dashed var(--border);
        }
        .qr-img { width: 100%; border-radius: 10px; margin-top: 10px; filter: grayscale(0.2) invert(0.05); }
        .donate-text { font-size: 12px; margin-top: 10px; font-weight: bold; color: var(--accent); }

        /* Music Player */
        .music-player {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            border-radius: 50px; padding: 10px 20px;
            display: flex; align-items: center; gap: 15px;
            border: 1px solid var(--border);
        }
        .music-disc {
            width: 40px; height: 40px; border-radius: 50%;
            animation: spin 5s linear infinite;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Tuyết rơi nhẹ nhàng */
        .snowflake {
            position: fixed; top: -10px; color: white; font-size: 8px;
            user-select: none; pointer-events: none; z-index: 1;
            animation: fall linear infinite;
        }
        @keyframes fall { to { transform: translateY(105vh); } }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="container">
    <img src="https://i.pinimg.com/736x/21/61/60/2161609169420076a591e1d279313931.jpg" class="profile-img">
    <h1>Tường 🎂</h1>
    <p class="bio">Chẳng cần bánh ngọt với kem<br>Chỉ cần em nói yêu anh, đủ rồi!</p>

    <div class="social-icons">
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-youtube"></i></a>
        <a href="#"><i class="fab fa-discord"></i></a>
        <a href="#"><i class="fab fa-tiktok"></i></a>
    </div>

    <a href="#" class="link-card">
        <i class="fab fa-discord"></i>
        <span>Box Giao Lưu Discord</span>
    </a>
    <a href="#" class="link-card">
        <i class="fas fa-heart"></i>
        <span>Playerduo Donate</span>
    </a>

    <div class="tiktok-card">
        <img src="https://i.pinimg.com/736x/21/61/60/2161609169420076a591e1d279313931.jpg" style="width: 50px; border-radius: 50%;">
        <div class="tk-info">
            <div class="tk-name">Tường 🎂</div>
            <div class="tk-stats">2048 Followers | 1221 Likes</div>
        </div>
        <button style="margin-left: auto; background: white; border: none; padding: 5px 15px; border-radius: 20px; font-weight: bold; cursor: pointer;">Follow</button>
    </div>

    <div class="qr-section">
        <p style="margin:0; font-weight: bold;">DONATE MOMO</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=Momo-Cua-Ban" class="qr-img">
        <p class="donate-text">NGUYEN VAN TUONG</p>
    </div>

    <div class="qr-section">
        <p style="margin:0; font-weight: bold;">MB BANK</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=MB-Bank-Cua-Ban" class="qr-img">
        <p class="donate-text">STK: 0852389220</p>
    </div>

    <div style="height: 100px;"></div> </div>

<div class="music-player">
    <img src="https://i.pinimg.com/originals/81/4f/98/814f982996d98d67f70b3e51d4590685.jpg" class="music-disc">
    <div style="flex-grow: 1; text-align: left;">
        <div style="font-size: 12px; font-weight: bold;">Đừng làm em buồn...</div>
        <div style="font-size: 10px; opacity: 0.6;">Phan Duy Anh x H0n</div>
    </div>
    <i class="fas fa-play" style="cursor: pointer;"></i>
</div>

<script>
    function createSnow() {
        const snow = document.createElement('div');
        snow.classList.add('snowflake');
        snow.innerHTML = '❄';
        snow.style.left = Math.random() * 100 + 'vw';
        snow.style.animationDuration = Math.random() * 3 + 4 + 's';
        snow.style.opacity = Math.random();
        document.body.appendChild(snow);
        setTimeout(() => { snow.remove(); }, 6000);
    }
    setInterval(createSnow, 200);
</script>

<audio autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

</body>
</html>
