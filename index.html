<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@012tuong | Luxury Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        const CONFIG = {
            ten_hien_thi: "Tường",
            anh_dai_dien: "https://bio.linkcdn.cc/upload/2025070705/1751865526895.png", 
            anh_nen: "https://i.pinimg.com/736x/48/b6/2a/48b62acabb7cfb0dd1391ffe57bd92c2.jpg",
            link_nhac_mp3: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/Lyric%20Video%20_%20%C4%91%E1%BB%A9a%20n%C3%A0o%20l%C3%A0m%20em%20bu%E1%BB%93n_%20-%20Ph%C3%BAc%20Du%20ft%20(mp3cut.net).mp3",
            ten_bai_hat: "Đứa nào làm em buồn...", 

            items: [
                { ten: "Facebook", icon: "fab fa-facebook", url: "https://www.facebook.com/wall.2k4", mau: "#1877f2" },
                { ten: "TikTok", icon: "fab fa-tiktok", url: "https://www.tiktok.com/@wall.2k4", mau: "#ffffff" },
                { ten: "Instagram", icon: "fab fa-instagram", url: "#", mau: "#e4405f" },
                { ten: "Discord", icon: "fab fa-discord", url: "#", mau: "#5865f2" },
                { ten: "Zalo", icon: "fas fa-comment", url: "#", mau: "#0068ff" },
                { ten: "Momo", icon: "fas fa-wallet", url: "#", mau: "#a50064" },
                { ten: "MB Bank", icon: "fas fa-university", url: "#", mau: "#004a99" },
                { ten: "YouTube", icon: "fab fa-youtube", url: "#", mau: "#ff0000" }
            ]
        };
    </script>

    <style>
        body { margin: 0; padding: 0; background: #050505; color: white; font-family: 'Montserrat', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; cursor: url('https://cur.cursors-4u.net/others/oth-9/oth807.cur'), auto !important; }
        
        /* VIDEO NỀN NÉT CĂNG */
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; }
        
        /* LỚP PHỦ TRONG SUỐT (KHÔNG MỜ) */
        .overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.3); /* Chỉ làm tối 30% để nhìn rõ video */
            z-index: -1; 
        }
        
        .music-top-left { position: fixed; top: 15px; left: 15px; z-index: 100; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); padding: 8px 20px; border-radius: 30px; display: flex; align-items: center; gap: 10px; backdrop-filter: blur(15px); width: 220px; overflow: hidden; }
        .marquee-container { flex-grow: 1; overflow: hidden; white-space: nowrap; position: relative; }
        .marquee-text { display: inline-block; padding-left: 100%; animation: marquee 10s linear infinite; font-size: 11px; font-weight: bold; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        .volume-container { display: flex; align-items: center; gap: 8px; }
        .volume-slider { width: 0; opacity: 0; transition: 0.3s; height: 4px; cursor: pointer; accent-color: white; }
        .volume-container:hover .volume-slider { width: 50px; opacity: 1; }

        .header { text-align: center; margin-top: 100px; margin-bottom: 30px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .avatar { width: 110px; height: 110px; border-radius: 50%; border: 2px solid white; margin-bottom: 10px; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .player-controls { width: 280px; margin-top: 15px; }
        .progress-bar-container { background: rgba(255,255,255,0.2); height: 5px; border-radius: 10px; margin: 8px 0; position: relative; overflow: hidden; cursor: pointer; }
        .progress-fill { background: #ff79c6; height: 100%; width: 0%; box-shadow: 0 0 10px #ff79c6; transition: width 0.1s linear; }
        .time-info { display: flex; justify-content: space-between; font-size: 11px; opacity: 0.8; font-weight: bold; }
        .main-btns { display: flex; justify-content: center; align-items: center; margin-top: 10px; }
        .play-main-btn { font-size: 28px; cursor: pointer; transition: 0.3s; color: white; }
        .play-main-btn:hover { transform: scale(1.1); color: #ff79c6; }

        .grid-container { display: grid; gap: 15px; width: 90%; max-width: 1000px; padding-bottom: 50px; }
        @media (min-width: 768px) { .grid-container { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 767px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
        .grid-item { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; text-align: center; text-decoration: none; color: white; transition: 0.4s; display: flex; flex-direction: column; align-items: center; }
        .grid-item i { font-size: 25px; margin-bottom: 10px; }
        .grid-item:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-5px); border-color: white; box-shadow: 0 5px 15px rgba(255,255,255,0.1); }

        .sparkle { position: absolute; width: 3px; height: 3px; background: white; border-radius: 50%; pointer-events: none; animation: blink 0.8s forwards; z-index: 999; }
        @keyframes blink { 0% { opacity: 1; } 100% { opacity: 0; transform: scale(3) translateY(10px); } }
        #play-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; display: flex; justify-content: center; align-items: center; cursor: pointer; font-weight: bold; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="play-overlay">KHÁM PHÁ THẾ GIỚI CỦA TƯỜNG</div>
    
    <video autoplay muted loop playsinline id="bg-video">
        <source src="https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/H%C3%ACnh%20N%E1%BB%81n%20%C4%90%E1%BB%99ng%204K.mp4" type="video/mp4">
    </video>
    
    <div class="overlay"></div>

    <div class="music-top-left">
        <i class="fas fa-compact-disc fa-spin" style="color: #ff79c6;"></i>
        <div class="marquee-container">
            <div class="marquee-text" id="m-name">Đang tải...</div>
        </div>
        <div class="volume-container">
            <i class="fas fa-volume-up" style="font-size: 12px;"></i>
            <input type="range" class="volume-slider" id="volumeControl" min="0" max="1" step="0.1" value="1">
        </div>
    </div>

    <div class="header">
        <img id="avatar" src="" class="avatar">
        <h1 id="user-name" style="margin:0; font-size: 26px;"></h1>
        <div class="player-controls">
            <div class="progress-bar-container" id="progressArea">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-info">
                <span id="currTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
            <div class="main-btns">
                <i id="playBtn" class="fas fa-play play-main-btn"></i>
            </div>
        </div>
    </div>

    <div class="grid-container" id="grid-content"></div>
    <audio id="myAudio" loop><source id="audioSrc" src="" type="audio/mpeg"></audio>

    <script>
        let titleText = "@012tuong ";
        setInterval(() => {
            titleText = titleText.substring(1) + titleText.substring(0, 1);
            document.title = titleText;
        }, 300);

        document.getElementById('avatar').src = CONFIG.anh_dai_dien;
        document.getElementById('user-name').innerText = CONFIG.ten_hien_thi;
        document.getElementById('m-name').innerText = CONFIG.ten_bai_hat;
        document.getElementById('audioSrc').src = CONFIG.link_nhac_mp3;

        const gridContent = CONFIG.items.map(item => `<a href="${item.url}" class="grid-item"><i class="${item.icon}" style="color: ${item.mau}"></i><b>${item.ten}</b></a>`).join('');
        document.getElementById('grid-content').innerHTML = gridContent;

        const audio = document.getElementById('myAudio');
        const playBtn = document.getElementById('playBtn');
        const progressFill = document.getElementById('progressFill');
        const currTimeTxt = document.getElementById('currTime');
        const totalTimeTxt = document.getElementById('totalTime');

        document.getElementById('play-overlay').onclick = function() {
            this.style.display = 'none';
            audio.play();
            playBtn.className = "fas fa-pause";
        };

        playBtn.onclick = () => {
            if (audio.paused) { audio.play(); playBtn.className = "fas fa-pause"; }
            else { audio.pause(); playBtn.className = "fas fa-play"; }
        };

        document.getElementById('volumeControl').oninput = (e) => { audio.volume = e.target.value; };

        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = pct + "%";
            currTimeTxt.innerText = formatTime(audio.currentTime);
            if (!isNaN(audio.duration)) totalTimeTxt.innerText = formatTime(audio.duration);
        };

        function formatTime(sec) {
            let m = Math.floor(sec / 60); let s = Math.floor(sec % 60);
            return m + ":" + (s < 10 ? "0" + s : s);
        }

        document.getElementById('progressArea').onclick = (e) => {
            const width = e.currentTarget.clientWidth;
            audio.currentTime = (e.offsetX / width) * audio.duration;
        };

        document.addEventListener('mousemove', (e) => {
            let s = document.createElement('div'); s.className = 'sparkle';
            s.style.left = e.pageX + 'px'; s.style.top = e.pageY + 'px';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 800);
        });
    </script>
</body>
</html>
