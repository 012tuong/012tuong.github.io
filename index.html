<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@012tuong | Luxury Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        const CONFIG = {
            ten_hien_thi: "Tường",
            anh_dai_dien: "https://r2.guns.lol/d9bd9b77-8ec4-49f1-9496-3c0c1cc67ca3.webp", 
            link_nhac_mp3: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/Lyric%20Video%20_%20%C4%91%E1%BB%A9a%20n%C3%A0o%20l%C3%A0m%20em%20bu%E1%BB%93n_%20-%20Ph%C3%BAc%20Du%20ft%20(mp3cut.net).mp3",
            ten_bai_hat: "Đứa nào làm em buồn...", 
            video_nen: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/202603110751.mp4",

            items: [
                { ten: "Facebook", icon: "fab fa-facebook", url: "https://www.facebook.com/wall.2k4", mau: "#1877f2" },
                { ten: "TikTok", icon: "fab fa-tiktok", url: "https://www.tiktok.com/@wall.2k4", mau: "#ffffff" },
                { ten: "Instagram", icon: "fab fa-instagram", url: "#", mau: "#e4405f" },
                { ten: "Discord", icon: "fab fa-discord", url: "#", mau: "#5865f2" },
                { ten: "Zalo", icon: "fas fa-comment", url: "#", mau: "#0068ff" },
                { ten: "Momo", icon: "fas fa-wallet", url: "#", mau: "#a50064" },
                { ten: "MB Bank", icon: "fas fa-university", url: "#", mau: "#004a99" },
                { ten: "YouTube", icon: "fab fa-youtube", url: "#", mau: "#ff0000" }
            ]
        };
    </script>

    <style>
        body { margin: 0; padding: 0; background: #000; color: white; font-family: 'Montserrat', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* VIDEO NỀN - KHÔNG MỜ */
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; background-color: #000; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: -1; backdrop-filter: none; }
        
        /* MUSIC BOX (TOP LEFT) */
        .music-top-left { position: fixed; top: 15px; left: 15px; z-index: 100; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); padding: 8px 15px; border-radius: 30px; display: flex; align-items: center; gap: 10px; backdrop-filter: blur(15px); width: 220px; }
        .marquee-container { flex-grow: 1; overflow: hidden; white-space: nowrap; }
        .marquee-text { display: inline-block; padding-left: 100%; animation: marquee 10s linear infinite; font-size: 11px; font-weight: bold; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        
        /* VOLUME CONTROL */
        .volume-container { display: flex; align-items: center; gap: 5px; }
        .volume-slider { width: 0; opacity: 0; transition: 0.3s; height: 4px; cursor: pointer; accent-color: #ff79c6; }
        .volume-container:hover .volume-slider { width: 60px; opacity: 1; }
        #muteBtn { cursor: pointer; font-size: 14px; }

        /* MAIN HEADER */
        .header { text-align: center; margin-top: 80px; margin-bottom: 30px; z-index: 1; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 20px rgba(255,255,255,0.2); margin-bottom: 10px; }
        .player-controls { width: 280px; margin: 0 auto; }
        .progress-bar-container { background: rgba(255,255,255,0.2); height: 5px; border-radius: 10px; margin: 10px 0; cursor: pointer; position: relative; }
        .progress-fill { background: #ff79c6; height: 100%; width: 0%; border-radius: 10px; box-shadow: 0 0 10px #ff79c6; }
        .time-info { display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; }
        .play-main-btn { font-size: 30px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .play-main-btn:hover { transform: scale(1.1); color: #ff79c6; }

        /* GRID SOCIAL */
        .grid-container { display: grid; gap: 15px; width: 90%; max-width: 1000px; padding-bottom: 50px; z-index: 1; }
        @media (min-width: 768px) { .grid-container { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 767px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
        .grid-item { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; text-align: center; text-decoration: none; color: white; transition: 0.4s; display: flex; flex-direction: column; align-items: center; }
        .grid-item i { font-size: 25px; margin-bottom: 10px; }
        .grid-item:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-5px); border-color: white; }

        /* OVERLAY KHI MỚI VÀO */
        #play-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; cursor: pointer; font-weight: bold; letter-spacing: 2px; text-align: center; }
    </style>
</head>
<body>

    <div id="play-overlay">MỞ THẾ GIỚI CỦA TƯỜNG</div>
    
    <video id="bg-video" autoplay muted loop playsinline preload="auto">
        <source src="https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/202603110751.mp4">
    </video>
    
    <div class="overlay"></div>

    <div class="music-top-left">
        <i class="fas fa-compact-disc fa-spin" style="color: #ff79c6;"></i>
        <div class="marquee-container">
            <div class="marquee-text" id="m-name">Đang tải...</div>
        </div>
        <div class="volume-container">
            <i class="fas fa-volume-up" id="muteBtn"></i>
            <input type="range" class="volume-slider" id="volumeControl" min="0" max="1" step="0.1" value="1">
        </div>
    </div>

    <div class="header">
        <img id="avatar" src="" class="avatar">
        <h1 id="user-name" style="margin:0; font-size: 26px;"></h1>
        <div class="player-controls">
            <div class="progress-bar-container" id="progressArea">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-info">
                <span id="currTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
            <i id="playBtn" class="fas fa-play play-main-btn"></i>
        </div>
    </div>

    <div class="grid-container" id="grid-content"></div>
    <audio id="myAudio" loop><source id="audioSrc" src="" type="audio/mpeg"></audio>

    <script>
        // Khởi tạo dữ liệu
        document.getElementById('avatar').src = CONFIG.anh_dai_dien;
        document.getElementById('user-name').innerText = CONFIG.ten_hien_thi;
        document.getElementById('m-name').innerText = CONFIG.ten_bai_hat;
        document.getElementById('audioSrc').src = CONFIG.link_nhac_mp3;

        const gridContent = CONFIG.items.map(item => `<a href="${item.url}" class="grid-item"><i class="${item.icon}" style="color: ${item.mau}"></i><b>${item.ten}</b></a>`).join('');
        document.getElementById('grid-content').innerHTML = gridContent;

        const audio = document.getElementById('myAudio');
        const video = document.getElementById('bg-video');
        const playBtn = document.getElementById('playBtn');
        const muteBtn = document.getElementById('muteBtn');
        const volSlider = document.getElementById('volumeControl');
        const overlay = document.getElementById('play-overlay');

        // HÀM ÉP CHẠY CHO IPHONE/SAFARI
        function startEverything() {
            overlay.style.display = 'none';
            // Ép video chạy trước
            video.play().catch(() => {
                video.muted = true;
                video.play();
            });
            // Ép nhạc chạy sau
            audio.play();
            playBtn.className = "fas fa-pause";
        }

        overlay.onclick = startEverything;
        overlay.ontouchstart = startEverything;

        // Điều khiển Play/Pause nhạc
        playBtn.onclick = () => {
            if (audio.paused) { audio.play(); playBtn.className = "fas fa-pause"; }
            else { audio.pause(); playBtn.className = "fas fa-play"; }
        };

        // Điều khiển Volume & Mute
        volSlider.oninput = (e) => {
            audio.volume = e.target.value;
            if(audio.volume == 0) muteBtn.className = "fas fa-volume-mute";
            else muteBtn.className = "fas fa-volume-up";
        };

        muteBtn.onclick = () => {
            if(audio.volume > 0) { audio.volume = 0; volSlider.value = 0; muteBtn.className = "fas fa-volume-mute"; }
            else { audio.volume = 1; volSlider.value = 1; muteBtn.className = "fas fa-volume-up"; }
        };

        // Thanh Progress bài hát
        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progressFill').style.width = pct + "%";
            document.getElementById('currTime').innerText = formatTime(audio.currentTime);
            if (!isNaN(audio.duration)) document.getElementById('totalTime').innerText = formatTime(audio.duration);
        };

        function formatTime(sec) {
            let m = Math.floor(sec / 60); let s = Math.floor(sec % 60);
            return m + ":" + (s < 10 ? "0" + s : s);
        }

        document.getElementById('progressArea').onclick = (e) => {
            const width = e.currentTarget.clientWidth;
            audio.currentTime = (e.offsetX / width) * audio.duration;
        };
    </script>
</body>
</html>
