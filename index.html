<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@012tuong | Luxury Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        const CONFIG = {
            ten_hien_thi: "Tường",
            anh_dai_dien: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/ttttt.jpg", 
            // LINK NHẠC ĐÃ ĐƯỢC CẬP NHẬT
            link_nhac_mp3: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/Iu%20L%C3%A0%20%C4%90%C3%A2y.mp3",
            ten_bai_hat: "Iu Là Đây...", 
            video_nen: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/202603110751.mp4",

            qr_zalo: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/zalo.jpg",
            qr_momo: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/momo.jpg",
            qr_mbbank: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/mb.jpg",

            items: [
                { ten: "Facebook", icon: "fab fa-facebook", url: "https://www.facebook.com/wall.2k4", mau: "#1877f2" },
                { ten: "TikTok", icon: "fab fa-tiktok", url: "https://www.tiktok.com/@wall.2k4", mau: "#ffffff" },
                { ten: "Instagram", icon: "fab fa-instagram", url: "https://www.instagram.com/wall_204/", mau: "#e4405f" },
                { ten: "Discord", icon: "fab fa-discord", url: "https://discord.com/invite/pE7jSeYVd5", mau: "#5865f2" },
                { ten: "Zalo", icon: "fas fa-comment", url: "qr", mau: "#0068ff" },
                { ten: "Momo", icon: "fas fa-wallet", url: "qr", mau: "#a50064" },
                { ten: "MB Bank", icon: "fas fa-university", url: "qr", mau: "#004a99" },
                { ten: "YouTube", icon: "fab fa-youtube", url: "https://www.youtube.com/@Tuong04", mau: "#ff0000" }
            ]
        };
    </script>

    <style>
        /* CURSOR */
        html, body { cursor: url('https://cur.cursors-4u.net/anime/ani-11/ani1097.cur'), auto !important; }
        a, button, .grid-item, #playBtn, .progress-bar-container { cursor: url('https://cur.cursors-4u.net/anime/ani-11/ani1097.cur'), pointer !important; }

        body { margin: 0; padding: 0; background: #000; color: white; font-family: 'Montserrat', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; background-color: #000; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: -1; }
        
        /* BOX NHẠC GÓC TRÁI - GỌN HƠN */
        .music-top-left, .view-counter-top-right { 
            position: fixed; top: 15px; z-index: 100; 
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); 
            padding: 5px 12px; border-radius: 30px; display: flex; align-items: center; 
            backdrop-filter: blur(15px); height: 32px; box-sizing: border-box;
        }
        .music-top-left { left: 15px; width: 160px; gap: 6px; }
        .view-counter-top-right { right: 15px; gap: 8px; font-size: 12px; font-weight: bold; }

        .marquee-container { flex-grow: 1; overflow: hidden; white-space: nowrap; }
        .marquee-text { display: inline-block; padding-left: 100%; animation: marquee 8s linear infinite; font-size: 9px; font-weight: bold; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        
        .volume-container { display: flex; align-items: center; gap: 5px; }
        .volume-slider { width: 0; opacity: 0; transition: 0.3s; height: 3px; cursor: pointer; accent-color: #ff79c6; }
        .volume-container:hover .volume-slider { width: 35px; opacity: 1; }
        #muteBtn { cursor: pointer; font-size: 11px; }

        .header { text-align: center; margin-top: 80px; margin-bottom: 30px; z-index: 1; position: relative; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 20px rgba(255,255,255,0.2); margin-bottom: 10px; }
        
        .name-wrapper { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 15px; }
        #user-name { margin: 0; font-size: 32px; font-weight: 700; color: #fff; text-shadow: 0 0 10px #ff79c6; }
        .verified-tick { color: #1877f2; font-size: 24px; }

        /* PLAYER CHÍNH - CĂN CHỈNH THẲNG HÀNG TUYỆT ĐỐI */
        .player-controls { 
            width: 320px; margin: 0 auto; display: flex; 
            align-items: center; justify-content: center; 
            gap: 10px; background: rgba(0,0,0,0.25);
            padding: 8px 15px; border-radius: 25px;
        }
        .play-main-btn { 
            font-size: 16px; /* Nhỏ lại theo yêu cầu */
            cursor: pointer; color: #ff79c6; 
            display: flex; align-items: center; justify-content: center;
            width: 20px; height: 20px;
        }
        .progress-bar-container { 
            flex-grow: 1; background: rgba(255,255,255,0.15); 
            height: 4px; border-radius: 10px; cursor: pointer; position: relative;
        }
        .progress-fill { background: #ff79c6; height: 100%; width: 0%; border-radius: 10px; box-shadow: 0 0 8px #ff79c6; }
        .time-info { 
            display: flex; gap: 3px; font-size: 10px; 
            font-weight: bold; min-width: 60px; justify-content: flex-end; opacity: 0.9;
            align-items: center; /* Đảm bảo thời gian cũng thẳng hàng */
        }

        .grid-container { display: grid; gap: 15px; width: 90%; max-width: 1000px; padding-bottom: 50px; z-index: 1; }
        @media (min-width: 768px) { .grid-container { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 767px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
        .grid-item { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; text-align: center; text-decoration: none; color: white; transition: 0.4s; display: flex; flex-direction: column; align-items: center; }
        .grid-item i { font-size: 25px; margin-bottom: 10px; }
        .grid-item:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-5px); border-color: white; }

        /* LỚP PHỦ CHỐNG BẤM XUYÊN */
        #play-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 9999; 
            display: flex; justify-content: center; align-items: center; 
            cursor: pointer; font-weight: bold; letter-spacing: 2px; text-align: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        #qr-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .qr-content { background: #1a1a1a; padding: 25px; border-radius: 25px; text-align: center; border: 1px solid #333; max-width: 300px; width: 85%; }
        .qr-content img { width: 100%; border-radius: 15px; margin-bottom: 15px; border: 4px solid white; }
        .qr-content h3 { margin: 0; font-size: 18px; color: #ff79c6; }
        .qr-content .owner-name { margin: 5px 0 15px 0; font-size: 14px; font-weight: bold; color: #fff; letter-spacing: 1px; }
        .close-btn { background: #ff79c6; border: none; color: white; padding: 8px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        .sparkle { position: absolute; width: 5px; height: 5px; border-radius: 50%; background-color: #ff79c6; box-shadow: 0 0 10px #ff79c6; pointer-events: none; z-index: 99999; animation: sparkleAnim 1s linear forwards; }
        @keyframes sparkleAnim { 0% { transform: scale(1) translateY(0); opacity: 1; } 100% { transform: scale(0) translateY(50px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="play-overlay">MỞ THẾ GIỚI CỦA TƯỜNG</div>
    
    <video id="bg-video" autoplay muted loop playsinline preload="auto">
        <source src="https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/202603110751.mp4">
    </video>
    
    <div class="overlay"></div>

    <div id="qr-modal">
        <div class="qr-content">
            <h3 id="qr-title">Quét mã</h3>
            <div class="owner-name">NGUYỄN VĂN TƯỜNG</div>
            <img id="qr-img" src="" alt="QR Code">
            <button class="close-btn" onclick="closeQR()">ĐÓNG</button>
        </div>
    </div>

    <div class="music-top-left">
        <i class="fas fa-compact-disc fa-spin" style="color: #ff79c6; font-size: 14px;"></i>
        <div class="marquee-container">
            <div class="marquee-text" id="m-name">Đang tải...</div>
        </div>
        <div class="volume-container">
            <i class="fas fa-volume-up" id="muteBtn"></i>
            <input type="range" class="volume-slider" id="volumeControl" min="0" max="1" step="0.1" value="1">
        </div>
    </div>

    <div class="view-counter-top-right">
        <i class="fas fa-eye" style="color: #ff79c6;"></i>
        <span id="view-count">...</span>
    </div>

    <div class="header">
        <img id="avatar" src="" class="avatar">
        
        <div class="name-wrapper">
            <h1 id="user-name"></h1>
            <i class="fas fa-check-circle verified-tick"></i>
        </div>

        <div class="player-controls">
            <i id="playBtn" class="fas fa-play play-main-btn"></i>
            <div class="progress-bar-container" id="progressArea">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-info">
                <span id="currTime">0:00</span>
                <span>/</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>
    </div>

    <div class="grid-container" id="grid-content"></div>
    <audio id="myAudio" loop><source id="audioSrc" src="" type="audio/mpeg"></audio>

    <script>
        document.getElementById('avatar').src = CONFIG.anh_dai_dien;
        document.getElementById('user-name').innerText = CONFIG.ten_hien_thi;
        document.getElementById('m-name').innerText = CONFIG.ten_bai_hat;
        document.getElementById('audioSrc').src = CONFIG.link_nhac_mp3;

        function handleViewCounter() {
            let views = localStorage.getItem('bio_view_count');
            if (!views) views = 1000;
            views = parseInt(views) + 1;
            localStorage.setItem('bio_view_count', views);
            document.getElementById('view-count').innerText = views.toLocaleString();
        }
        handleViewCounter();

        document.addEventListener('mousemove', function(e) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = e.pageX + 'px';
            sparkle.style.top = e.pageY + 'px';
            const colors = ['#ff79c6', '#bd93f9', '#ffffff'];
            sparkle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 1000);
        });

        setInterval(() => {
            const nameEl = document.getElementById('user-name');
            if(!nameEl) return;
            const rect = nameEl.getBoundingClientRect();
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = (rect.left + Math.random() * rect.width) + 'px';
            sparkle.style.top = (rect.top + window.scrollY + Math.random() * rect.height) + 'px';
            sparkle.style.width = '3px'; sparkle.style.height = '3px';
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 800);
        }, 150);

        const gridContent = CONFIG.items.map(item => {
            if (item.url === "qr") {
                return `<div onclick="showQR('${item.ten}')" class="grid-item"><i class="${item.icon}" style="color: ${item.mau}"></i><b>${item.ten}</b></div>`;
            }
            return `<a href="${item.url}" target="_blank" class="grid-item"><i class="${item.icon}" style="color: ${item.mau}"></i><b>${item.ten}</b></a>`;
        }).join('');
        document.getElementById('grid-content').innerHTML = gridContent;

        function showQR(type) {
            const modal = document.getElementById('qr-modal');
            const img = document.getElementById('qr-img');
            const title = document.getElementById('qr-title');
            title.innerText = "Quét mã " + type;
            if (type === "Zalo") img.src = CONFIG.qr_zalo;
            else if (type === "Momo") img.src = CONFIG.qr_momo;
            else if (type === "MB Bank") img.src = CONFIG.qr_mbbank;
            modal.style.display = "flex";
        }
        function closeQR() { document.getElementById('qr-modal').style.display = "none"; }

        const audio = document.getElementById('myAudio');
        const video = document.getElementById('bg-video');
        const playBtn = document.getElementById('playBtn');
        const muteBtn = document.getElementById('muteBtn');
        const volSlider = document.getElementById('volumeControl');
        const overlay = document.getElementById('play-overlay');

        function startEverything() {
            document.body.style.pointerEvents = "none";
            overlay.style.opacity = '0';
            overlay.style.visibility = 'hidden';
            
            video.play().catch(() => { video.muted = true; video.play(); });
            audio.load(); // Load lại để chắc chắn link mới hoạt động
            audio.play();
            playBtn.className = "fas fa-pause play-main-btn";

            setTimeout(() => {
                document.body.style.pointerEvents = "auto";
                overlay.style.display = 'none';
            }, 600);
        }

        overlay.onclick = startEverything;
        overlay.ontouchstart = (e) => {
            e.preventDefault(); 
            startEverything();
        };

        playBtn.onclick = () => {
            if (audio.paused) { audio.play(); playBtn.className = "fas fa-pause play-main-btn"; }
            else { audio.pause(); playBtn.className = "fas fa-play play-main-btn"; }
        };

        volSlider.oninput = (e) => {
            audio.volume = e.target.value;
            muteBtn.className = audio.volume == 0 ? "fas fa-volume-mute" : "fas fa-volume-up";
        };

        muteBtn.onclick = () => {
            if(audio.volume > 0) { audio.volume = 0; volSlider.value = 0; muteBtn.className = "fas fa-volume-mute"; }
            else { audio.volume = 1; volSlider.value = 1; muteBtn.className = "fas fa-volume-up"; }
        };

        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progressFill').style.width = pct + "%";
            document.getElementById('currTime').innerText = formatTime(audio.currentTime);
            if (!isNaN(audio.duration)) document.getElementById('totalTime').innerText = formatTime(audio.duration);
        };

        function formatTime(sec) {
            let m = Math.floor(sec / 60); let s = Math.floor(sec % 60);
            return m + ":" + (s < 10 ? "0" + s : s);
        }

        document.getElementById('progressArea').onclick = (e) => {
            const width = e.currentTarget.clientWidth;
            audio.currentTime = (e.offsetX / width) * audio.duration;
        };
    </script>
</body>
</html>
