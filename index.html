<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>@Tường | Luxury</title>
    <link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/ttttt.jpg">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        const CONFIG = {
            ten_hien_thi: "Tường",
            anh_dai_dien: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/ttttt.jpg", 
            link_nhac_mp3: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/Iu%20La%20Day.mp3",
            ten_bai_hat: "Iu Là Đây...", 
            video_nen: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/202603110751.mp4",
            qr_zalo: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/zalo.jpg",
            qr_momo: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/momo.jpg",
            qr_mbbank: "https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/mb.jpg",
            items: [
                { ten: "Facebook", icon: "fab fa-facebook", url: "https://www.facebook.com/wall.2k4", mau: "#1877f2" },
                { ten: "TikTok", icon: "fab fa-tiktok", url: "https://www.tiktok.com/@wall.2k4", mau: "#ffffff" },
                { ten: "Instagram", icon: "fab fa-instagram", url: "https://www.instagram.com/wall_204/", mau: "#e4405f" },
                { ten: "Discord", icon: "fab fa-discord", url: "https://discord.com/invite/pE7jSeYVd5", mau: "#5865f2" },
                { ten: "Zalo", icon: "fas fa-comment", url: "qr", mau: "#0068ff" },
                { ten: "Momo", icon: "fas fa-wallet", url: "qr", mau: "#a50064" },
                { ten: "MB Bank", icon: "fas fa-university", url: "qr", mau: "#004a99" },
                { ten: "YouTube", icon: "fab fa-youtube", url: "https://www.youtube.com/@Tuong04", mau: "#ff0000" }
            ]
        };
    </script>

    <style>
        /* CURSOR */
        html, body { cursor: url('https://cur.cursors-4u.net/anime/ani-11/ani1097.cur'), auto !important; }
        a, button, .grid-item, #playBtn, .progress-bar-container { cursor: url('https://cur.cursors-4u.net/anime/ani-11/ani1097.cur'), pointer !important; }

        body { margin: 0; padding: 0; background: #000; color: white; font-family: 'Montserrat', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; -webkit-text-size-adjust: 100%; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; background-color: #000; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: -1; }
        
        .sparkle-name {
            background: linear-gradient(90deg, #ff79c6, #bd93f9, #ff79c6);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 2.5s linear infinite, glow 1.5s ease-in-out infinite alternate;
            display: inline-block;
        }
        @keyframes shine { to { background-position: 200% center; } }
        @keyframes glow {
            from { text-shadow: 0 0 5px rgba(255, 121, 198, 0.4); }
            to { text-shadow: 0 0 15px rgba(189, 147, 249, 0.7), 0 0 8px rgba(255, 121, 198, 0.5); }
        }

        .music-top-left, .view-counter-top-right { 
            position: fixed; top: 15px; z-index: 100; 
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); 
            padding: 5px 12px; border-radius: 30px; display: flex; align-items: center; 
            backdrop-filter: blur(15px); height: 32px; box-sizing: border-box;
        }
        .music-top-left { left: 15px; width: 120px; gap: 6px; }
        .view-counter-top-right { right: 15px; gap: 8px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .view-counter-top-right:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.05); }

        .marquee-container { flex-grow: 1; overflow: hidden; white-space: nowrap; }
        .marquee-text { display: inline-block; padding-left: 100%; animation: marquee 8s linear infinite; font-size: 9px; font-weight: bold; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        
        /* PLAYER CONTROL */
        .player-controls { width: 320px; margin: 0 auto; display: flex; align-items: center; justify-content: center; gap: 12px; background: rgba(0,0,0,0.25); padding: 10px 18px; border-radius: 25px; }
        .play-main-btn { font-size: 16px; cursor: pointer; color: #ff79c6; display: flex; align-items: center; justify-content: center; width: 25px; height: 25px; }
        .progress-bar-container { flex-grow: 1; background: rgba(255,255,255,0.15); height: 6px; border-radius: 10px; cursor: pointer; position: relative; display: flex; align-items: center; }
        .progress-fill { background: #ff79c6; height: 100%; width: 0%; border-radius: 10px; box-shadow: 0 0 10px #ff79c6; position: relative; }
        .progress-fill::after { content: ""; position: absolute; right: -6px; top: 50%; transform: translateY(-50%); width: 12px; height: 12px; background: #fff; border-radius: 50%; box-shadow: 0 0 8px #ff79c6; }
        .time-info { display: flex; gap: 3px; font-size: 10px; font-weight: bold; min-width: 60px; justify-content: flex-end; opacity: 0.9; }

        /* INPUT OVERLAY */
        #play-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .input-group { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        #usernameInput { padding: 12px 20px; border-radius: 25px; border: 2px solid #ff79c6; background: rgba(0,0,0,0.5); color: white; outline: none; text-align: center; width: 220px; font-size: 16px; font-family: 'Montserrat'; }
        .enter-btn { background: linear-gradient(45deg, #ff79c6, #bd93f9); border: none; color: white; padding: 10px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; font-family: 'Montserrat'; transition: 0.3s; box-shadow: 0 0 15px rgba(255, 121, 198, 0.4); }
        .enter-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(189, 147, 249, 0.6); }

        /* MODAL & GUESTBOOK */
        #qr-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .qr-content { background: #1a1a1a; padding: 25px; border-radius: 25px; text-align: center; border: 1px solid #333; max-width: 350px; width: 90%; }
        #guest-list-area { max-height: 350px; overflow-y: auto; margin-top: 10px; scrollbar-width: thin; scrollbar-color: #ff79c6 #1a1a1a; }
        .guest-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #222; transition: 0.3s; }
        .guest-rank { width: 35px; font-weight: bold; font-size: 14px; text-align: center; margin-right: 10px; }
        .rank-1 { color: #ffd700; font-size: 18px; }
        .rank-2 { color: #c0c0c0; font-size: 17px; }
        .rank-3 { color: #cd7f32; font-size: 16px; }
        .guest-info { flex-grow: 1; text-align: left; }
        .guest-name { color: #fff; font-weight: 600; font-size: 14px; }
        .guest-time { display: block; font-size: 10px; opacity: 0.5; }

        /* GRID SYSTEM */
        .grid-container { display: grid; gap: 15px; width: 90%; max-width: 1000px; padding-bottom: 50px; z-index: 1; }
        @media (min-width: 768px) { .grid-container { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 767px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
        .grid-item { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; text-align: center; text-decoration: none; color: white; transition: 0.4s; display: flex; flex-direction: column; align-items: center; }
        .grid-item i { font-size: 25px; margin-bottom: 10px; }
        .grid-item:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-5px); border-color: white; }

        .sparkle { position: absolute; width: 5px; height: 5px; border-radius: 50%; background-color: #ff79c6; box-shadow: 0 0 10px #ff79c6; pointer-events: none; z-index: 99999; animation: sparkleAnim 1s linear forwards; }
        @keyframes sparkleAnim { 0% { transform: scale(1) translateY(0); opacity: 1; } 100% { transform: scale(0) translateY(50px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="play-overlay">
        <div class="input-group">
            <div style="font-size:20px; margin-bottom:10px; color: #ff79c6; text-shadow: 0 0 10px #ff79c6; font-weight: bold; letter-spacing: 2px;">
                MỞ THẾ GIỚI CỦA TƯỜNG
            </div>
            <input id="usernameInput" placeholder="Nhập tên của bạn...">
            <button class="enter-btn" onclick="startEverything()">XÁC NHẬN <i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
    
    <video id="bg-video" muted loop playsinline preload="auto">
        <source src="https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/202603110751.mp4">
    </video>
    
    <div class="overlay"></div>

    <div id="qr-modal">
        <div class="qr-content">
            <h3 id="qr-title" style="color:#ff79c6; margin-bottom: 15px;"></h3>
            <div id="qr-owner-name" style="margin: 5px 0 15px 0; font-size: 14px; font-weight: bold; color: #fff; letter-spacing: 1px;">NGUYỄN VĂN TƯỜNG</div>
            <img id="qr-img" src="" style="width:100%; border-radius:15px; border:4px solid #fff; margin-bottom:15px;">
            <div id="guest-list-area"></div>
            <button class="close-btn" onclick="closeQR()" style="background:#ff79c6; border:none; color:white; padding:10px; border-radius:20px; cursor:pointer; width:100%; margin-top:15px; font-weight:bold;">ĐÓNG</button>
        </div>
    </div>

    <div class="music-top-left">
        <i class="fas fa-compact-disc fa-spin" style="color: #ff79c6; font-size: 14px;"></i>
        <div class="marquee-container">
            <div class="marquee-text" id="m-name">Đang tải...</div>
        </div>
    </div>

    <div class="view-counter-top-right" onclick="showVisitorMenu()">
        <i class="fas fa-crown" style="color: #ffd700;"></i>
        <span id="view-count">...</span>
    </div>

    <div class="header" style="text-align:center; margin-top:80px; z-index:1; position:relative;">
        <img id="avatar" src="https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/ttttt.jpg" style="width:100px; height:100px; border-radius:50%; border:2px solid #fff; margin-bottom:10px;">
        <div class="name-wrapper" style="display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:15px;">
            <h1 id="user-name" class="sparkle-name" style="font-size:32px; margin:0;">Tường</h1>
            <i class="fas fa-check-circle" style="color:#1877f2; font-size:24px;"></i>
        </div>

        <div class="player-controls">
            <i id="playBtn" class="fas fa-play play-main-btn"></i>
            <div class="progress-bar-container" id="progressArea">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-info">
                <span id="currTime">0:00</span> / <span id="totalTime">0:00</span>
            </div>
        </div>
    </div>

    <div class="grid-container" id="grid-content" style="margin-top:30px;"></div>
    <audio id="myAudio" loop><source id="audioSrc" src="https://raw.githubusercontent.com/012tuong/012tuong.github.io/main/Iu%20La%20Day.mp3" type="audio/mpeg"></audio>

    <script>
        document.getElementById('m-name').innerText = CONFIG.ten_bai_hat;
        
        const gridContent = CONFIG.items.map(item => {
            if (item.url === "qr") return `<div onclick="showQR('${item.ten}')" class="grid-item"><i class="${item.icon}" style="color: ${item.mau}"></i><b>${item.ten}</b></div>`;
            return `<a href="${item.url}" target="_blank" class="grid-item"><i class="${item.icon}" style="color: ${item.mau}"></i><b>${item.ten}</b></a>`;
        }).join('');
        document.getElementById('grid-content').innerHTML = gridContent;

        const audio = document.getElementById('myAudio');
        const video = document.getElementById('bg-video');
        const overlay = document.getElementById('play-overlay');

        function startEverything() {
            const name = document.getElementById("usernameInput").value.trim();
            if (name.length < 2) { alert("Tên ngắn quá Tường ơi!"); return; }
            
            localStorage.setItem("visitor_identity", name);
            const now = Date.now();
            if (!localStorage.getItem("last_log_time") || (now - localStorage.getItem("last_log_time") > 300000)) {
                window.logVisitor(name);
                localStorage.setItem("last_log_time", now);
            }

            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 500);
            video.play().catch(() => { video.muted = true; video.play(); });
            audio.play();
            document.getElementById('playBtn').className = "fas fa-pause play-main-btn";
        }

        window.onload = () => {
            if(localStorage.getItem("visitor_identity")) {
                overlay.style.display = 'none';
                video.play().catch(() => { video.muted = true; video.play(); });
                audio.play();
                document.getElementById('playBtn').className = "fas fa-pause play-main-btn";
            }
        };

        function showQR(type) {
            document.getElementById('qr-modal').style.display = 'flex';
            document.getElementById('qr-title').innerText = "Quét mã " + type;
            document.getElementById('qr-owner-name').style.display = 'block';
            document.getElementById('qr-img').style.display = 'block';
            document.getElementById('guest-list-area').style.display = 'none';
            if (type === "Zalo") document.getElementById('qr-img').src = CONFIG.qr_zalo;
            else if (type === "Momo") document.getElementById('qr-img').src = CONFIG.qr_momo;
            else document.getElementById('qr-img').src = CONFIG.qr_mbbank;
        }

        function closeQR() { document.getElementById('qr-modal').style.display = 'none'; }

        document.addEventListener('mousemove', (e) => {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = e.pageX + 'px'; sparkle.style.top = e.pageY + 'px';
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 1000);
        });

        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progressFill').style.width = pct + "%";
            document.getElementById('currTime').innerText = Math.floor(audio.currentTime/60) + ":" + ("0"+Math.floor(audio.currentTime%60)).slice(-2);
            if(audio.duration) document.getElementById('totalTime').innerText = Math.floor(audio.duration/60) + ":" + ("0"+Math.floor(audio.duration%60)).slice(-2);
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, addDoc, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyD8yhKBVhd99r1Nn-90N3pkj5VM56FYEmk", authDomain: "tuong-66302.firebaseapp.com", projectId: "tuong-66302" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.logVisitor = async (name) => {
            try { await addDoc(collection(db, "visitors"), { name, time: Date.now() }); } catch(e){}
        };

        window.showVisitorMenu = async () => {
            const area = document.getElementById('guest-list-area');
            document.getElementById('qr-modal').style.display = 'flex';
            // CẬP NHẬT: Tên tiêu đề mới ở đây
            document.getElementById('qr-title').innerText = "TRAI XINH GÁI ĐẸP ✨";
            document.getElementById('qr-owner-name').style.display = 'none';
            document.getElementById('qr-img').style.display = 'none';
            area.style.display = 'block';
            area.innerHTML = "<div style='padding:20px;'>Đang tính toán...</div>";

            try {
                const q = query(collection(db, "visitors"), orderBy("time", "desc"));
                const snap = await getDocs(q);
                let html = "";
                let i = 1;
                snap.forEach(doc => {
                    const d = doc.data();
                    let rankIcon = i;
                    let rankClass = "";
                    if(i === 1) { rankIcon = '<i class="fas fa-crown"></i>'; rankClass = "rank-1"; }
                    else if(i === 2) { rankIcon = '<i class="fas fa-medal"></i>'; rankClass = "rank-2"; }
                    else if(i === 3) { rankIcon = '<i class="fas fa-award"></i>'; rankClass = "rank-3"; }

                    html += `
                        <div class="guest-item">
                            <div class="guest-rank ${rankClass}">${rankIcon}</div>
                            <div class="guest-info">
                                <span class="guest-name">${d.name}</span>
                                <span class="guest-time">${new Date(d.time).toLocaleString('vi-VN')}</span>
                            </div>
                        </div>`;
                    i++;
                });
                area.innerHTML = html || "Chưa có dữ liệu";
            } catch(e){ area.innerHTML = "Lỗi tải!"; }
        };

        async function handleViews() {
            const ref = doc(db, "views", "counter");
            const snap = await getDoc(ref);
            if(snap.exists()) document.getElementById("view-count").innerText = snap.data().count;
            if(!localStorage.getItem("v_t") || (Date.now() - localStorage.getItem("v_t") > 86400000)) {
                if(!snap.exists()) await setDoc(ref, {count:1});
                else await updateDoc(ref, {count: snap.data().count + 1});
                localStorage.setItem("v_t", Date.now());
            }
        }
        handleViews();
    </script>
</body>
</html>
