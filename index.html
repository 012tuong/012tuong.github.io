<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio của 012tuong</title>
    <style>
        /* NỀN VÀ CHỮ */
        body { 
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?auto=format&fit=crop&w=1350&q=80'); /* Link ảnh nền đêm sao */
            background-size: cover; background-attachment: fixed;
            display: flex; justify-content: center; align-items: center; height: 100vh; color: white; overflow: hidden;
        }

        /* KHUNG BIO */
        .card { 
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px);
            width: 320px; padding: 30px; border-radius: 25px; text-align: center;
            border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            z-index: 10;
        }

        /* ẢNH ĐẠI DIỆN */
        .avatar {
            width: 100px; height: 100px; border-radius: 50%;
            border: 3px solid white; object-fit: cover; margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        /* NÚT BẤM CÓ HIỆU ỨNG */
        .button {
            display: block; background: white; color: #333;
            padding: 12px; margin: 15px 0; text-decoration: none;
            border-radius: 50px; font-weight: bold; transition: 0.3s;
        }
        .button:hover { 
            transform: scale(1.05); background: #007bff; color: white;
            box-shadow: 0 0 20px rgba(0,123,255,0.6);
        }

        /* HIỆU ỨNG MƯA TUYẾT */
        .snowflakes { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .snowflake { color: #fff; font-size: 1em; position: fixed; top: -10%; user-select: none; cursor: default; animation: fall linear infinite; }
        @keyframes fall {
            to { transform: translateY(110vh); }
        }
    </style>
</head>
<body>

    <div class="snowflakes">
        <div class="snowflake" style="left:10%; animation-duration:10s;">❄</div>
        <div class="snowflake" style="left:30%; animation-duration:8s;">.</div>
        <div class="snowflake" style="left:50%; animation-duration:12s;">❄</div>
        <div class="snowflake" style="left:70%; animation-duration:7s;">.</div>
        <div class="snowflake" style="left:90%; animation-duration:11s;">❄</div>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/150" class="avatar" alt="Avatar">
        
        <h2>012tuong 👋</h2>
        <p>Chào mừng bạn ghé thăm!</p>

        <a class="button" href="LINK_FACEBOOK_CỦA_BẠN">Facebook của mình</a>
        <a class="button" href="LINK_ZALO_CỦA_BẠN">Kết bạn Zalo</a>

        <audio autoplay loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>
        <p style="font-size: 10px; opacity: 0.7;">(Nhạc đang phát... 🎵)</p>
    </div>

</body>
</html>
